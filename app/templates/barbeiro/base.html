<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>BarberOS — {% block title %}{% endblock %}</title>
  <!-- Anti-FOUC: aplica tema ANTES do render -->
  <script>
    if(localStorage.getItem('barberos_tema')==='claro')document.documentElement.classList.add('light');
    (function(){try{var t=JSON.parse(localStorage.getItem('barberos_barbearia_tema'));if(t){var r=document.documentElement.style;if(t.cor_primaria)r.setProperty('--cor-primaria',t.cor_primaria);if(t.cor_fundo)r.setProperty('--cor-fundo',t.cor_fundo);if(t.cor_card)r.setProperty('--cor-card',t.cor_card);if(t.fonte)r.setProperty('--fonte',"'"+t.fonte+"', sans-serif");}}catch(e){}}());
  </script>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    /* ── Variáveis de tema ──────────────────────────────────── */
    :root {
      --bz-page:    #1a1a1a;
      --bz-surface: #1f1f1f;
      --bz-card:    #242424;
      --bz-input:   #1e1e1e;
      --bz-bd:      #2d2d2d;
      --bz-bd2:     #333;
      --bz-t1:      #fff;
      --bz-t2:      #aaa;
      --bz-t3:      #777;
      --bz-t4:      #666;
      --bz-t5:      #555;
    }
    html.light {
      --bz-page:    #f0f2f5;
      --bz-surface: #ffffff;
      --bz-card:    #f8f9fb;
      --bz-input:   #eef0f3;
      --bz-bd:      #e0e4e9;
      --bz-bd2:     #d0d5db;
      --bz-t1:      #111827;
      --bz-t2:      #374151;
      --bz-t3:      #6b7280;
      --bz-t4:      #9ca3af;
      --bz-t5:      #6b7280;
    }

    body { background: var(--bz-page); color: var(--bz-t1); }

    /* ── Header ────────────────────────────────────────────── */
    .b-header {
      background: var(--bz-surface);
      border-bottom: 1px solid var(--bz-bd);
      padding: 0 16px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .b-brand {
      font-size: 16px;
      font-weight: 700;
      color: var(--bz-t1);
      text-decoration: none;
      flex-shrink: 0;
    }
    .b-brand span { color: var(--cor-primaria); }
    .b-header-sep { width: 1px; height: 20px; background: var(--bz-bd2); flex-shrink: 0; }
    .b-user { flex: 1; font-size: 13px; color: var(--bz-t2); min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .b-time { font-size: 13px; color: var(--bz-t4); flex-shrink: 0; font-variant-numeric: tabular-nums; }
    .b-logout {
      background: none;
      border: none;
      color: var(--bz-t4);
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      transition: color .15s;
      flex-shrink: 0;
      display: flex;
    }
    .b-logout:hover { color: #dc2626; }

    /* ── Content ───────────────────────────────────────────── */
    .b-content {
      max-width: 520px;
      margin: 0 auto;
      padding: 16px 16px 80px;
    }

    /* ── Booking banner ────────────────────────────────────── */
    .bk-bar {
      background: rgba(186,117,23,.07); border-bottom: 1px solid rgba(186,117,23,.15);
      padding: 7px 16px; display: flex; align-items: center; gap: 8px;
    }
    .bk-label { font-size: 11px; color: var(--bz-t4); font-weight: 600; white-space: nowrap; }
    .bk-link  {
      font-size: 12px; font-weight: 700; color: var(--cor-primaria);
      text-decoration: none; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; flex: 1; min-width: 0;
    }
    .bk-link:hover { text-decoration: underline; }
    .bk-copy {
      background: none; border: 1px solid rgba(186,117,23,.3); color: var(--cor-primaria);
      border-radius: 6px; padding: 3px 8px; font-size: 10px; font-weight: 700;
      cursor: pointer; font-family: inherit; flex-shrink: 0; white-space: nowrap;
    }
    .bk-copy:hover { background: rgba(186,117,23,.1); }

    /* ── Bottom nav ────────────────────────────────────────── */
    .b-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bz-surface); border-top: 1px solid var(--bz-bd);
      display: flex; overflow-x: auto; z-index: 100;
      scrollbar-width: none;
    }
    .b-nav::-webkit-scrollbar { display: none; }
    .b-nav-item {
      flex: 1; min-width: 58px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 8px 2px 6px; color: var(--bz-t5); text-decoration: none;
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px;
      border-top: 2px solid transparent; transition: all .15s; white-space: nowrap;
    }
    .b-nav-item:hover  { color: #aaa; }
    .b-nav-item.active { color: var(--cor-primaria); border-top-color: var(--cor-primaria); }

    /* ── Card ──────────────────────────────────────────────── */
    .b-card {
      background: var(--bz-card);
      border: 1px solid var(--bz-bd);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    /* ── Toast ─────────────────────────────────────────────── */
    #toasts {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; gap: 8px; z-index: 9999;
      width: calc(100% - 32px); max-width: 400px;
    }
    .toast {
      padding: 12px 16px; border-radius: 10px; font-size: 14px; font-weight: 500;
      text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,.4);
      animation: tIn .2s ease;
    }
    .toast.t-success { background: #14532d; border: 1px solid #16a34a; color: #bbf7d0; }
    .toast.t-error   { background: #7f1d1d; border: 1px solid #dc2626; color: #fecaca; }
    .toast.t-info    { background: rgba(186,117,23,.15); border: 1px solid #BA7517; color: #fbbf24; }
    @keyframes tIn  { from { transform: translateY(20px); opacity:0; } to { transform: none; opacity:1; } }
    @keyframes tOut { to   { transform: translateY(20px); opacity:0; } }
    .toast.out { animation: tOut .2s ease forwards; }

    /* ── Modal ─────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.7);
      display: none; align-items: flex-end; justify-content: center;
      z-index: 1000;
    }
    .modal-overlay.visible { display: flex; }
    .modal-box {
      background: var(--bz-card); border: 1px solid var(--bz-bd2);
      border-radius: 16px 16px 0 0;
      padding: 20px; width: 100%; max-width: 520px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-handle { width: 36px; height: 4px; background: var(--bz-bd2); border-radius: 4px; margin: 0 auto 16px; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .modal-header h3 { font-size: 15px; font-weight: 700; color: var(--bz-t1); }
    .modal-close { background: none; border: none; color: var(--bz-t4); font-size: 22px; cursor: pointer; padding: 0; line-height: 1; }

    {% block styles %}{% endblock %}

    /* ── Light overrides (template-level classes) ────────────── */
    html.light .db-card,.html.light .chart-card { background: var(--bz-card); border-color: var(--bz-bd); }
    html.light .db-card  { background: var(--bz-card); border-color: var(--bz-bd); }
    html.light .db-label { color: var(--bz-t5); }
    html.light .db-value { color: var(--cor-primaria); }
    html.light .db-sub   { color: var(--bz-t4); }
    html.light .chart-card { background: var(--bz-card); border-color: var(--bz-bd); }
    html.light .chart-lbl  { color: var(--bz-t5); }

    html.light .dia-btn    { background: var(--bz-card); border-color: var(--bz-bd2); color: var(--bz-t2); }
    html.light .dia-label  { color: var(--bz-t2); }
    html.light .sched-wrap { background: var(--bz-surface); border-color: var(--bz-bd); }
    html.light .sched-table th { background: var(--bz-page); color: var(--bz-t5); border-color: var(--bz-bd); }
    html.light .sched-table td { border-color: var(--bz-bd); }
    html.light .sched-table tbody tr:hover { background: rgba(0,0,0,.03); }
    html.light .sched-empty   { color: var(--bz-t4); }
    html.light .td-hora       { color: var(--bz-t1); }
    html.light .td-cli-nome   { color: var(--bz-t1); }
    html.light .td-cli-sv     { color: var(--bz-t4); }
    html.light .row-done      { opacity: .5; }
    html.light .m-slot-info   { background: rgba(186,117,23,.08); }
    html.light .mfield input, html.light .mfield select { background: var(--bz-input); border-color: var(--bz-bd2); color: var(--bz-t1); }
    html.light .mfield select option { background: var(--bz-surface); color: var(--bz-t1); }
    html.light .btn-ghost  { border-color: var(--bz-bd2); color: var(--bz-t4); }
    html.light .btn-cancel { border-color: rgba(220,38,38,.5); }

    html.light .p-table-wrap { background: var(--bz-surface); border-color: var(--bz-bd); }
    html.light .p-table th   { background: var(--bz-page); color: var(--bz-t5); border-color: var(--bz-bd); }
    html.light .p-table td   { border-color: var(--bz-bd); }
    html.light .p-search     { background: var(--bz-input); border-color: var(--bz-bd2); color: var(--bz-t1); }
    html.light .p-empty      { color: var(--bz-t4); }

    html.light .pf-card { background: var(--bz-card); border-color: var(--bz-bd); }
    html.light .pf-nome { color: var(--bz-t1); }
    html.light .pf-row  { border-color: var(--bz-bd); }
    html.light .pf-key  { color: var(--bz-t4); }
    html.light .pf-val  { color: var(--bz-t2); }
    html.light .mf input { background: var(--bz-input); border-color: var(--bz-bd2); color: var(--bz-t1); }

    html.light .rd-card        { background: var(--bz-card); border-color: var(--bz-bd); }
    html.light .rd-title       { color: var(--bz-t2); }
    html.light .rd-field input { background: var(--bz-input); border-color: var(--bz-bd2); color: var(--bz-t1); }
    html.light .btn-full.ghost { border-color: var(--bz-bd2); color: var(--bz-t4); }

    html.light .cfg-card    { background: var(--bz-card); border-color: var(--bz-bd); }
    html.light .cfg-title   { color: var(--bz-t4); }
    html.light .cfg-row     { border-color: var(--bz-bd); }
    html.light .cfg-label   { color: var(--bz-t1); }
    html.light .cfg-desc    { color: var(--bz-t4); }
    html.light .cfg-version { color: var(--bz-t4); }
    html.light .sw-track    { background: var(--bz-bd2); }
  </style>
</head>
<body>
  <header class="b-header">
    <a class="b-brand" href="/barbeiro/dashboard" id="bBrand">BarberOS</a>
    <div class="b-header-sep"></div>
    <span class="b-user" id="bUser">—</span>
    <span class="b-time" id="bTime"></span>
    <button class="b-logout" onclick="api.logout()" title="Sair">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </header>

  <div class="bk-bar" id="bkBar" style="display:none">
    <span class="bk-label">📅 Agendar:</span>
    <a class="bk-link" id="bkLink" href="#" target="_blank">—</a>
    <button class="bk-copy" onclick="copiarLink()" title="Copiar link">Copiar</button>
  </div>

  <main class="b-content">
    {% block content %}{% endblock %}
  </main>

  <nav class="b-nav" id="bNav">
    <a class="b-nav-item" href="/barbeiro/dashboard" data-path="/barbeiro/dashboard">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Início
    </a>
    <a class="b-nav-item" href="/barbeiro/agenda" data-path="/barbeiro/agenda">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Agenda
    </a>
    <a class="b-nav-item" href="/barbeiro/clientes" data-path="/barbeiro/clientes">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Clientes
    </a>
    <a class="b-nav-item" href="/barbeiro/produtos" data-path="/barbeiro/produtos">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      Produtos
    </a>
    <a class="b-nav-item" href="/barbeiro/perfil" data-path="/barbeiro/perfil">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Perfil
    </a>
    <a class="b-nav-item" href="/barbeiro/redefinicoes" data-path="/barbeiro/redefinicoes">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Conta
    </a>
    <a class="b-nav-item" href="/barbeiro/configuracoes" data-path="/barbeiro/configuracoes">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      Config
    </a>
  </nav>

  <div id="toasts"></div>

  <script src="/static/js/api.js"></script>
<script src="/static/js/upload-widget.js"></script>
  <script>
    // ── Nav active state ──────────────────────────────────────
    document.querySelectorAll('.b-nav-item[data-path]').forEach(a => {
      if (window.location.pathname === a.dataset.path) a.classList.add('active');
    });
  </script>
  <script>
    // ── Auth guard ────────────────────────────────────────────
    (function() {
      const u = api.getUser();
      if (!u || !api.getToken()) { window.location.href = '/login'; return; }
      if (!['barbeiro','gestor','super_admin'].includes(u.perfil)) {
        window.location.href = '/login'; return;
      }
      document.getElementById('bUser').textContent = u.nome || 'Barbeiro';
    })();

    // ── Booking banner ────────────────────────────────────────
    (async function() {
      try {
        const d = await api.barbeiro.urlAgendamento();
        const bar  = document.getElementById('bkBar');
        const link = document.getElementById('bkLink');
        const href = d.url.startsWith('http') ? d.url : location.origin + d.url;
        link.href        = href;
        link.textContent = href;
        bar.style.display = '';
      } catch(e) { /* silencioso */ }
    })();

    window._bkHref = '#';
    function copiarLink() {
      const link = document.getElementById('bkLink');
      navigator.clipboard?.writeText(link.href).then(() => toast('Link copiado!', 'info'));
    }

    // ── Tema da barbearia ─────────────────────────────────────
    (async function() {
      const KEY = 'barberos_barbearia_tema';
      function _applyTheme(t) {
        const r = document.documentElement.style;
        if (t.cor_primaria) r.setProperty('--cor-primaria', t.cor_primaria);
        if (t.cor_fundo)    r.setProperty('--cor-fundo',    t.cor_fundo);
        if (t.cor_card)     r.setProperty('--cor-card',     t.cor_card);
        if (t.fonte)        r.setProperty('--fonte', "'" + t.fonte + "', sans-serif");
        if (t.nome_exibicao) {
          const el = document.getElementById('bBrand');
          if (el) el.textContent = t.nome_exibicao;
          document.title = t.nome_exibicao + ' — ' + (document.title.split(' — ')[1] || '').trim();
        }
      }
      try { _applyTheme(JSON.parse(localStorage.getItem(KEY)) || {}); } catch {}
      try {
        const t = await api.barbearia.tema();
        localStorage.setItem(KEY, JSON.stringify(t));
        _applyTheme(t);
      } catch {}
    })();

    // ── Relógio ───────────────────────────────────────────────
    function tick() {
      const t = new Date();
      document.getElementById('bTime').textContent =
        t.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
    }
    tick();
    setInterval(tick, 5000);

    // ── Toast ─────────────────────────────────────────────────
    function toast(msg, tipo = 'success') {
      const d = document.createElement('div');
      d.className = `toast t-${tipo}`;
      d.textContent = msg;
      document.getElementById('toasts').appendChild(d);
      setTimeout(() => d.classList.add('out'), 2500);
      setTimeout(() => d.remove(), 2800);
    }

    // ── Modal ─────────────────────────────────────────────────
    function abrirModal(id)  { document.getElementById(id).classList.add('visible'); }
    function fecharModal(id) { document.getElementById(id).classList.remove('visible'); }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.visible')
        .forEach(m => m.classList.remove('visible'));
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
