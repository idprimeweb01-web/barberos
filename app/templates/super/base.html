<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BarberOS Super — {% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css">
  {% block styles %}{% endblock %}
  <style>
    body { display: flex; margin: 0; }
    .app-shell { display: flex; width: 100%; min-height: 100vh; }

    .sidebar {
      width: 230px; flex-shrink: 0;
      background: #161616; border-right: 1px solid #2a2a2a;
      display: flex; flex-direction: column;
      position: fixed; left: 0; top: 0; height: 100vh; z-index: 200;
      transition: transform .25s;
    }
    .sidebar-brand {
      padding: 20px 20px 16px; font-size: 20px; font-weight: 700;
      border-bottom: 1px solid #2a2a2a;
    }
    .sidebar-brand a { color: #fff; text-decoration: none; }
    .sidebar-brand span { color: var(--cor-primaria); }
    .sidebar-supertag {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
      color: var(--cor-primaria); background: rgba(186,117,23,.1); border: 1px solid rgba(186,117,23,.2);
      border-radius: 4px; padding: 2px 6px; margin-top: 4px; display: inline-block;
    }
    .sidebar-nav { flex: 1; padding: 8px 0; }
    .nav-link {
      display: flex; align-items: center; gap: 10px; padding: 11px 20px;
      color: #777; text-decoration: none; font-size: 14px; font-weight: 500;
      border-left: 3px solid transparent; transition: all .15s;
    }
    .nav-link:hover { color: #ddd; background: rgba(255,255,255,.04); }
    .nav-link.active { color: var(--cor-primaria); background: rgba(186,117,23,.1); border-left-color: var(--cor-primaria); }
    .sidebar-footer {
      padding: 14px 16px; border-top: 1px solid #2a2a2a;
      display: flex; align-items: center; gap: 10px;
    }
    .sa-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(186,117,23,.2); border: 1.5px solid rgba(186,117,23,.5);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: var(--cor-primaria); flex-shrink: 0;
    }
    .sidebar-user-info { flex: 1; min-width: 0; }
    .sidebar-user-name { font-size: 12px; font-weight: 600; color: #ccc; }
    .sidebar-user-role { font-size: 11px; color: #555; }
    .btn-logout {
      background: none; border: none; color: #444; cursor: pointer;
      padding: 4px; transition: color .15s; border-radius: 6px; display: flex;
    }
    .btn-logout:hover { color: #dc2626; }

    .app-main { margin-left: 230px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .app-header {
      height: 56px; background: #161616; border-bottom: 1px solid #2a2a2a;
      padding: 0 16px 0 20px; display: flex; align-items: center; gap: 10px;
      position: sticky; top: 0; z-index: 100;
    }
    .hamburger { display: none; background: none; border: none; color: #888; cursor: pointer; padding: 4px; align-items: center; }
    .hamburger:hover { color: #ccc; }
    .page-title { font-size: 16px; font-weight: 600; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hdr-username { font-size: 12px; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; }
    .hdr-logout {
      background: none; border: none; color: #444; cursor: pointer;
      padding: 6px; border-radius: 6px; display: flex; align-items: center; transition: color .15s; flex-shrink: 0;
    }
    .hdr-logout:hover { color: #dc2626; }
    .app-content { flex: 1; padding: 24px; }

    /* Tables, cards, modals — same as gestor */
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .section-title  { font-size: 18px; font-weight: 700; }
    .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 14px; margin-bottom: 24px; }
    .metric-card { background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 10px; padding: 18px 20px; display: flex; flex-direction: column; gap: 6px; }
    .metric-label { font-size: 12px; color: #666; font-weight: 500; text-transform: uppercase; letter-spacing: .4px; }
    .metric-value { font-size: 30px; font-weight: 700; color: var(--cor-primaria); line-height: 1; }
    .table-wrap { background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 10px; overflow: hidden; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { padding: 11px 16px; text-align: left; font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: .5px; background: #181818; border-bottom: 1px solid #2a2a2a; }
    .data-table td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid #202020; vertical-align: middle; }
    .data-table tbody tr:last-child td { border-bottom: none; }
    .data-table tbody tr:hover { background: rgba(255,255,255,.015); }
    .td-actions { display: flex; gap: 6px; }
    .badge-green  { background: rgba(34,197,94,.12); color: #4ade80; border-radius: 999px; padding: 2px 9px; font-size: 11px; font-weight: 700; }
    .badge-gray   { background: rgba(255,255,255,.07); color: #666; border-radius: 999px; padding: 2px 9px; font-size: 11px; font-weight: 700; }
    .badge-gold   { background: rgba(186,117,23,.15); color: var(--cor-primaria); border-radius: 999px; padding: 2px 9px; font-size: 11px; font-weight: 700; }
    .btn-icon { background: none; border: 1px solid #2a2a2a; color: #777; border-radius: 7px; padding: 5px 10px; cursor: pointer; font-size: 12px; font-family: inherit; transition: all .15s; }
    .btn-icon:hover { border-color: var(--cor-primaria); color: var(--cor-primaria); }
    .btn-icon.danger:hover { border-color: #dc2626; color: #dc2626; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal-overlay.visible { display: flex; }
    .modal-box { background: #1e1e1e; border: 1px solid #2d2d2d; border-radius: 12px; padding: 24px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-header h3 { font-size: 15px; font-weight: 700; }
    .modal-close { background: none; border: none; color: #555; font-size: 22px; cursor: pointer; padding: 0; }
    .modal-close:hover { color: #fff; }
    .modal-footer { margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end; }
    .chart-wrap { background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 10px; padding: 20px; }
    .chart-title { font-size: 14px; font-weight: 600; color: #777; margin-bottom: 14px; }
    #toasts { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 9999; }
    .toast { padding: 12px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; min-width: 220px; box-shadow: 0 4px 16px rgba(0,0,0,.4); animation: tIn .2s ease; }
    .toast.t-success { background: #14532d; border: 1px solid #16a34a; color: #bbf7d0; }
    .toast.t-error   { background: #7f1d1d; border: 1px solid #dc2626; color: #fecaca; }
    @keyframes tIn  { from { transform: translateX(110%); opacity:0; } to { transform: translateX(0); opacity:1; } }
    @keyframes tOut { to   { transform: translateX(110%); opacity:0; } }
    .toast.out { animation: tOut .2s ease forwards; }
    .foto-avatar { width: 34px; height: 34px; border-radius: 50%; background: #2a2a2a; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--cor-primaria); overflow: hidden; flex-shrink: 0; }
    .foto-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .empty-state { text-align: center; padding: 48px 20px; color: #444; font-size: 14px; }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: none; box-shadow: 4px 0 24px rgba(0,0,0,.6); }
      .app-main { margin-left: 0; }
      .hamburger { display: flex; }
      .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 199; display: none; }
      .sidebar-overlay.visible { display: block; }
      .metrics-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 480px) {
      .app-content { padding: 16px 12px; }
      .app-header { padding: 0 14px; }
      .metrics-grid { grid-template-columns: 1fr; }
      .section-header { flex-direction: column; align-items: flex-start; gap: 10px; }
      .table-wrap { overflow-x: auto; }
    }
  </style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <a href="/super/dashboard">Barber<span>OS</span></a>
      <div><span class="sidebar-supertag">Super Admin</span></div>
    </div>
    <nav class="sidebar-nav">
      <a href="/super/dashboard"  class="nav-link" data-path="/super/dashboard">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a href="/super/barbearias" class="nav-link" data-path="/super/barbearias">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Barbearias
      </a>
      <a href="/super/gestores" class="nav-link" data-path="/super/gestores">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Gestores
      </a>
      <a href="/super/relatorios" class="nav-link" data-path="/super/relatorios">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Relatórios
      </a>
    </nav>
  </aside>

  <div class="app-main">
    <header class="app-header">
      <button class="hamburger" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="page-title">{% block page_title %}{% endblock %}</span>
      <span class="hdr-username" id="saName"></span>
      <button class="hdr-logout" onclick="api.logout()" title="Sair">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </header>
    <main class="app-content">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>

<div id="toasts"></div>
<script src="/static/js/api.js"></script>
<script src="/static/js/upload-widget.js"></script>
<script>
  (function() {
    const u = api.getUser();
    if (!u || !api.getToken()) { window.location.href = '/login'; return; }
    if (u.perfil !== 'super_admin') { window.location.href = '/login'; return; }
    document.getElementById('saName').textContent = u.nome || 'Super Admin';
  })();
  document.querySelectorAll('.nav-link[data-path]').forEach(a => {
    if (window.location.pathname === a.dataset.path) a.classList.add('active');
    a.addEventListener('click', () => { if (window.innerWidth <= 768) closeSidebar(); });
  });
  function toast(msg, tipo = 'success') {
    const d = document.createElement('div');
    d.className = `toast t-${tipo}`; d.textContent = msg;
    document.getElementById('toasts').appendChild(d);
    setTimeout(() => d.classList.add('out'), 2600);
    setTimeout(() => d.remove(), 2900);
  }
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('visible');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('visible');
  }
  function abrirModal(id)  { document.getElementById(id).classList.add('visible'); }
  function fecharModal(id) { document.getElementById(id).classList.remove('visible'); }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.visible').forEach(m => m.classList.remove('visible'));
  });
  function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
{% block scripts %}{% endblock %}
</body>
</html>
