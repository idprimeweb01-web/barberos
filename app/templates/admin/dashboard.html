<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BarberOS — Dashboard Admin</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100dvh; }

    .topbar {
      background: var(--cor-card);
      border-bottom: 1px solid var(--cor-borda);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar .brand {
      font-size: 18px;
      font-weight: 700;
      color: var(--cor-texto);
    }
    .topbar .brand span { color: var(--cor-primaria); }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-name {
      font-size: 14px;
      color: var(--cor-texto-secundario);
    }

    .btn-sair {
      background: none;
      border: 1px solid var(--cor-borda);
      border-radius: 8px;
      color: var(--cor-texto-secundario);
      font-size: 13px;
      font-family: var(--fonte);
      padding: 6px 12px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-sair:hover { border-color: var(--cor-primaria); color: var(--cor-primaria); }

    .page-content {
      flex: 1;
      padding: 32px 20px;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
    }

    .construcao {
      text-align: center;
      padding: 60px 0;
    }

    .construcao .icon-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      background: rgba(186,117,23,0.1);
      border-radius: 18px;
      margin-bottom: 20px;
    }

    .construcao h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .construcao p {
      color: var(--cor-texto-secundario);
      font-size: 14px;
    }

    .badge-perfil {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(186,117,23,0.12);
      border: 1px solid rgba(186,117,23,0.25);
      color: var(--cor-primaria);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 12px;
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="brand">Barber<span>OS</span></div>
    <div class="topbar-right">
      <span class="user-name" id="nome-usuario">Carregando...</span>
      <button class="btn-sair" onclick="api.logout()">Sair</button>
    </div>
  </header>

  <main class="page-content">
    <div class="construcao">
      <div class="icon-wrap">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#BA7517" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </div>
      <h2>Painel Administrativo</h2>
      <p>Esta tela está em construção.<br>Em breve você terá acesso a todos os relatórios e configurações.</p>
      <span class="badge-perfil">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        Admin
      </span>
    </div>
  </main>

  <script src="/static/js/api.js"></script>
  <script>
    (function() {
      const user = api.getUser();
      if (!user || !api.getToken()) {
        window.location.href = '/login';
        return;
      }
      if (user.perfil !== 'admin') {
        window.location.href = '/barbeiro/agenda';
        return;
      }
      document.getElementById('nome-usuario').textContent = user.nome || 'Admin';
    })();
  </script>
</body>
</html>
