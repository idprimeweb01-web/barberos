<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BarberOS — Entrar</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px 20px;
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-area .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      background: rgba(186,117,23,0.12);
      border: 1.5px solid rgba(186,117,23,0.3);
      border-radius: 16px;
      margin-bottom: 16px;
    }

    .logo-area h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo-area h1 span { color: var(--cor-primaria); }

    .logo-area p {
      margin-top: 6px;
      color: var(--cor-texto-secundario);
      font-size: 14px;
    }

    .form-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .link-forgot {
      font-size: 13px;
      color: var(--cor-texto-secundario);
      transition: color 0.2s;
    }
    .link-forgot:hover { color: var(--cor-primaria); }

    #msg-erro {
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-wrap">

    <!-- Logo -->
    <div class="logo-area">
      <div class="logo-icon">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#BA7517" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 4h18"/>
          <path d="M6 4v2a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V4"/>
          <path d="M9 12v6"/>
          <path d="M15 12v6"/>
          <path d="M5 20h14"/>
          <circle cx="12" cy="9" r="1"/>
        </svg>
      </div>
      <h1>Barber<span>OS</span></h1>
      <p>Sistema de gestão para barbearias</p>
    </div>

    <!-- Card de login -->
    <div class="card">

      <!-- Alerta de erro -->
      <div id="msg-erro" class="alert alert-error" role="alert">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="msg-erro-texto"></span>
      </div>

      <form id="form-login" novalidate>

        <!-- Email -->
        <div class="field">
          <label for="email">E-mail</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
              </svg>
            </span>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="seu@email.com"
              autocomplete="email"
              class="has-action"
              required
            >
          </div>
        </div>

        <!-- Senha -->
        <div class="field">
          <label for="senha">Senha</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              type="password"
              id="senha"
              name="senha"
              placeholder="••••••••"
              autocomplete="current-password"
              class="has-action"
              required
            >
            <button type="button" class="input-action" id="toggle-senha" aria-label="Mostrar senha">
              <!-- Olho aberto -->
              <svg id="icon-olho-aberto" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <!-- Olho fechado (oculto por padrão) -->
              <svg id="icon-olho-fechado" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-10-8-10-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 10 8 10 8a18.5 18.5 0 0 1-2.16 3.19M1 1l22 22"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Lembrar-me -->
        <div class="form-footer">
          <label class="checkbox-wrap">
            <input type="checkbox" id="lembrar" name="lembrar">
            <span>Lembrar-me</span>
          </label>
          <a href="#" class="link-forgot">Esqueci a senha</a>
        </div>

        <!-- Botão -->
        <button type="submit" class="btn btn-primary" id="btn-entrar">
          <span id="btn-texto">ENTRAR</span>
          <span id="btn-spinner" class="spinner" style="display:none"></span>
        </button>

      </form>
    </div>

    <p class="text-center text-muted mt-24">
      BarberOS &copy; 2026 &mdash; Gestão profissional para barbearias
    </p>
  </div>

  <script src="/static/js/api.js"></script>
  <script>
    // ── Toggle mostrar/ocultar senha ───────────────────────────────
    const campoSenha   = document.getElementById('senha');
    const toggleSenha  = document.getElementById('toggle-senha');
    const iconAberto   = document.getElementById('icon-olho-aberto');
    const iconFechado  = document.getElementById('icon-olho-fechado');

    toggleSenha.addEventListener('click', () => {
      const visivel = campoSenha.type === 'text';
      campoSenha.type = visivel ? 'password' : 'text';
      iconAberto.style.display  = visivel ? '' : 'none';
      iconFechado.style.display = visivel ? 'none' : '';
      toggleSenha.setAttribute('aria-label', visivel ? 'Mostrar senha' : 'Ocultar senha');
    });

    // ── Exibir erro ────────────────────────────────────────────────
    function mostrarErro(msg) {
      const box  = document.getElementById('msg-erro');
      const texto = document.getElementById('msg-erro-texto');
      texto.textContent = msg;
      box.style.display = 'flex';
      box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function ocultarErro() {
      document.getElementById('msg-erro').style.display = 'none';
    }

    // ── Estado do botão ────────────────────────────────────────────
    function setCarregando(ativo) {
      const btn     = document.getElementById('btn-entrar');
      const texto   = document.getElementById('btn-texto');
      const spinner = document.getElementById('btn-spinner');
      btn.disabled          = ativo;
      texto.style.display   = ativo ? 'none' : '';
      spinner.style.display = ativo ? '' : 'none';
    }

    // ── Submit ─────────────────────────────────────────────────────
    document.getElementById('form-login').addEventListener('submit', async (e) => {
      e.preventDefault();
      ocultarErro();

      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const lembrar = document.getElementById('lembrar').checked;

      if (!email) { mostrarErro('Informe o e-mail.'); return; }
      if (!senha)  { mostrarErro('Informe a senha.');  return; }

      setCarregando(true);

      try {
        const dados = await api.post('/auth/login', { email, senha });

        api.setToken(dados.token);
        api.setUser(dados.usuario);

        if (lembrar) {
          localStorage.setItem('barberos_lembrar', '1');
        }

        const perfil = dados.usuario.perfil;
        if (perfil === 'super_admin') {
          window.location.href = '/super/dashboard';
        } else if (perfil === 'gestor') {
          window.location.href = '/gestor/dashboard';
        } else if (perfil === 'barbeiro') {
          window.location.href = '/barbeiro/agenda';
        } else if (perfil === 'admin') {
          window.location.href = '/admin/dashboard';
        } else {
          window.location.href = '/';
        }

      } catch (err) {
        setCarregando(false);
        mostrarErro(err.message || 'Erro ao fazer login. Tente novamente.');
      }
    });

    // ── Se já logado, redirecionar ─────────────────────────────────
    (function() {
      const token  = api.getToken();
      const perfil = api.getPerfil();
      if (token && perfil) {
        if (perfil === 'gestor' || perfil === 'super_admin') window.location.href = '/gestor/dashboard';
        else if (perfil === 'barbeiro') window.location.href = '/barbeiro/agenda';
        else if (perfil === 'admin')    window.location.href = '/admin/dashboard';
      }
    })();
  </script>
</body>
</html>
