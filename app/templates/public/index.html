<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">BarberOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <style>
    :root {
      --cor-primaria: #BA7517;
      --cor-fundo:    #1a1a1a;
      --cor-card:     #2a2a2a;
      --cor-texto:    #ffffff;
      --fonte:        'Inter', sans-serif;
      --cp-08: rgba(186,117,23,.08); --cp-10: rgba(186,117,23,.10);
      --cp-12: var(--cp-12); --cp-15: var(--cp-15);
      --cp-20: rgba(186,117,23,.20); --cp-25: rgba(186,117,23,.25);
      --cp-30: rgba(186,117,23,.30); --cp-35: var(--cp-35);
      --cp-45: var(--cp-45);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--fonte); background: var(--cor-fundo); color: var(--cor-texto); }
    a { color: var(--cor-primaria); text-decoration: none; }

    /* ── Hero ──────────────────────────────────────────────── */
    .hero {
      min-height: 100dvh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 32px 24px;
      background: radial-gradient(ellipse at 50% 0%, var(--cp-15) 0%, transparent 70%);
    }
    .hero-logo {
      width: 90px; height: 90px; border-radius: 22px; margin-bottom: 24px;
      object-fit: cover; border: 2px solid var(--cp-30);
    }
    .hero-logo-placeholder {
      width: 90px; height: 90px; border-radius: 22px; margin-bottom: 24px;
      background: var(--cp-12); border: 2px solid var(--cp-30);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; font-weight: 800; color: var(--cor-primaria);
    }
    .hero-nome { font-size: 32px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
    .hero-sub  { font-size: 16px; color: rgba(255,255,255,.5); margin-bottom: 36px; }
    .hero-cta  {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--cor-primaria); color: #fff;
      padding: 16px 36px; border-radius: 50px; font-size: 17px; font-weight: 700;
      text-decoration: none; transition: all .2s;
      box-shadow: 0 8px 32px var(--cp-35);
    }
    .hero-cta:hover { transform: translateY(-2px); box-shadow: 0 12px 40px var(--cp-45); color:#fff; }
    .hero-scroll { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,.3); font-size: 12px; }

    /* ── Sections ──────────────────────────────────────────── */
    .section { padding: 48px 24px; max-width: 600px; margin: 0 auto; }
    .section-title {
      font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--cor-primaria); margin-bottom: 20px;
    }

    /* ── Barbeiros ─────────────────────────────────────────── */
    .barbeiros-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px;
    }
    .barbeiro-card {
      background: var(--cor-card); border: 1px solid rgba(255,255,255,.07); border-radius: 14px;
      padding: 20px 12px; text-align: center;
    }
    .barbeiro-av {
      width: 58px; height: 58px; border-radius: 50%; margin: 0 auto 12px;
      background: var(--cp-12); border: 2px solid var(--cp-30);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 800; color: var(--cor-primaria);
      overflow: hidden;
    }
    .barbeiro-av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .barbeiro-nome { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .barbeiro-bio  { font-size: 12px; color: rgba(255,255,255,.4); }

    /* ── Serviços ──────────────────────────────────────────── */
    .servicos-list { display: flex; flex-direction: column; gap: 10px; }
    .servico-card {
      background: var(--cor-card); border: 1px solid rgba(255,255,255,.07); border-radius: 12px;
      padding: 16px 18px; display: flex; justify-content: space-between; align-items: center;
    }
    .servico-nome { font-size: 15px; font-weight: 600; }
    .servico-meta { font-size: 12px; color: rgba(255,255,255,.4); margin-top: 2px; }
    .servico-preco { font-size: 16px; font-weight: 800; color: var(--cor-primaria); }

    /* ── Footer CTA ────────────────────────────────────────── */
    .footer-cta {
      position: sticky; bottom: 0; background: var(--cor-fundo);
      border-top: 1px solid rgba(255,255,255,.06); padding: 14px 24px;
    }
    .footer-cta a {
      display: block; text-align: center; background: var(--cor-primaria); color: #fff;
      padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 700;
      transition: all .2s;
    }
    .footer-cta a:hover { filter: brightness(1.1); }

    /* ── Divider ───────────────────────────────────────────── */
    .divider { height: 1px; background: rgba(255,255,255,.06); margin: 0 24px; }

    .loading { text-align: center; color: rgba(255,255,255,.3); padding: 32px; font-size: 14px; }
  </style>
</head>
<body>

<div style="position:relative">
  <!-- Hero -->
  <section class="hero" id="hero">
    <div id="logoArea"></div>
    <h1 class="hero-nome" id="heroNome">Carregando…</h1>
    <p class="hero-sub">Agende seu horário online, rápido e fácil</p>
    <a class="hero-cta" id="heroBtn" href="#barbeiros">
      Agendar agora
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>
  </section>

  <!-- Barbeiros -->
  <div class="divider"></div>
  <section class="section" id="barbeiros">
    <div class="section-title">Nossa equipe</div>
    <div class="barbeiros-grid" id="barbeirosGrid"><div class="loading">Carregando…</div></div>
  </section>

  <div class="divider"></div>

  <!-- Serviços -->
  <section class="section">
    <div class="section-title">Serviços e preços</div>
    <div class="servicos-list" id="servicosList"><div class="loading">Carregando…</div></div>
  </section>

  <div style="height:80px"></div>
</div>

<!-- Footer CTA fixo -->
<div class="footer-cta">
  <a href="agendar" id="btnAgendar">Agendar horário →</a>
</div>

<script>
  const SLUG = '{{ slug }}';

  function _rgba(hex, a) {
    const h = (hex || '#BA7517').replace('#', '');
    const r = parseInt(h.slice(0,2),16) || 186;
    const g = parseInt(h.slice(2,4),16) || 117;
    const b = parseInt(h.slice(4,6),16) || 23;
    return `rgba(${r},${g},${b},${a})`;
  }

  async function carregar() {
    // Tema
    try {
      const info = await fetch(`/b/${SLUG}/barbearia-info`).then(r => r.json());
      document.title = info.nome + ' — BarberOS';
      document.getElementById('heroNome').textContent = info.nome;
      document.getElementById('pageTitle').textContent = info.nome;

      // Aplica tema dinâmico
      const root = document.documentElement.style;
      const cp = info.cor_primaria || '#BA7517';
      root.setProperty('--cor-primaria', cp);
      root.setProperty('--cor-fundo',    info.cor_fundo || '#1a1a1a');
      root.setProperty('--cor-card',     info.cor_card  || '#2a2a2a');
      if (info.fonte) root.setProperty('--fonte', `'${info.fonte}', sans-serif`);
      // Tons transparentes da cor primária
      [.08,.10,.12,.15,.20,.25,.30,.35,.45].forEach(a => {
        root.setProperty(`--cp-${String(a*100).replace('.','').padStart(2,'0')}`, _rgba(cp, a));
      });

      // Logo
      const logoArea = document.getElementById('logoArea');
      if (info.logo_url) {
        logoArea.innerHTML = `<img src="${info.logo_url}" class="hero-logo" alt="${info.nome}">`;
      } else {
        logoArea.innerHTML = `<div class="hero-logo-placeholder">${info.nome.charAt(0).toUpperCase()}</div>`;
      }
    } catch(e) {
      document.getElementById('heroNome').textContent = 'Barbearia';
      document.getElementById('logoArea').innerHTML = '<div class="hero-logo-placeholder">B</div>';
    }

    // Barbeiros
    try {
      const barbs = await fetch(`/b/${SLUG}/barbeiros`).then(r => r.json());
      const grid  = document.getElementById('barbeirosGrid');
      if (!barbs.length) { grid.innerHTML = '<p class="loading">Nenhum barbeiro.</p>'; }
      else grid.innerHTML = barbs.map(b => `
        <div class="barbeiro-card">
          <div class="barbeiro-av">
            ${b.foto ? `<img src="${b.foto}" alt="${b.nome}">` : b.nome.charAt(0).toUpperCase()}
          </div>
          <div class="barbeiro-nome">${b.nome}</div>
          ${b.bio ? `<div class="barbeiro-bio">${b.bio}</div>` : ''}
        </div>
      `).join('');
    } catch(e) { document.getElementById('barbeirosGrid').innerHTML = '<p class="loading">Erro ao carregar.</p>'; }

    // Serviços
    try {
      const svs = await fetch(`/b/${SLUG}/servicos`).then(r => r.json());
      const list = document.getElementById('servicosList');
      if (!svs.length) { list.innerHTML = '<p class="loading">Nenhum serviço.</p>'; }
      else list.innerHTML = svs.map(s => `
        <div class="servico-card">
          <div>
            <div class="servico-nome">${s.nome}</div>
            <div class="servico-meta">${s.duracao_minutos} min${s.descricao ? ' · ' + s.descricao : ''}</div>
          </div>
          <div class="servico-preco">R$ ${s.preco.toFixed(2)}</div>
        </div>
      `).join('');
    } catch(e) { document.getElementById('servicosList').innerHTML = '<p class="loading">Erro ao carregar.</p>'; }
  }

  carregar();
</script>
</body>
</html>
