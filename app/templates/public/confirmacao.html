<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendamento confirmado!</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <style>
    :root{--cor-primaria:#BA7517;--cor-fundo:#1a1a1a;--cor-card:#2a2a2a;--fonte:'Inter',sans-serif;
      --cp-10:rgba(186,117,23,.10);--cp-12:var(--cp-12);--cp-15:var(--cp-15);--cp-30:rgba(186,117,23,.30);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--fonte);background:var(--cor-fundo);color:#fff;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}

    .check-circle{
      width:80px;height:80px;border-radius:50%;
      background:rgba(34,197,94,.12);border:3px solid rgba(34,197,94,.3);
      display:flex;align-items:center;justify-content:center;
      margin-bottom:20px;
      animation:pop .4s ease;
    }
    @keyframes pop{from{transform:scale(.5);opacity:0;}to{transform:scale(1);opacity:1;}}

    h1{font-size:24px;font-weight:800;margin-bottom:8px;text-align:center;}
    .sub{font-size:14px;color:rgba(255,255,255,.4);text-align:center;margin-bottom:28px;}

    .resumo{background:var(--cor-card);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:20px;width:100%;max-width:400px;margin-bottom:24px;}
    .resumo-row{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);}
    .resumo-row:last-child{border-bottom:none;padding-bottom:0;}
    .resumo-icon{width:32px;height:32px;border-radius:8px;background:var(--cp-10);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;}
    .resumo-label{font-size:11px;color:rgba(255,255,255,.35);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
    .resumo-val{font-size:15px;font-weight:600;}

    .barb-row{display:flex;align-items:center;gap:10px;}
    .barb-av{width:36px;height:36px;border-radius:50%;background:var(--cp-12);border:1.5px solid var(--cp-30);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--cor-primaria);overflow:hidden;flex-shrink:0;}
    .barb-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}

    .btn-home{
      width:100%;max-width:400px;padding:15px;background:var(--cor-primaria);
      color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;
      font-family:var(--fonte);cursor:pointer;transition:all .15s;text-decoration:none;
      text-align:center;display:block;
    }
    .btn-home:hover{filter:brightness(1.1);color:#fff;}

    .loading{color:rgba(255,255,255,.3);font-size:14px;}
  </style>
</head>
<body>
  <div class="check-circle">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  </div>

  <h1>Agendamento confirmado!</h1>
  <p class="sub">Te esperamos na data combinada 😊</p>

  <div class="resumo" id="resumo">
    <div class="loading">Carregando detalhes…</div>
  </div>

  <a class="btn-home" id="btnHome" href="/b/{{ slug }}/">← Voltar para a home</a>

<script>
  const SLUG  = '{{ slug }}';
  const AG_ID = {{ ag_id }};
  const esc   = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  async function carregar() {
    // Aplica tema
    try {
      const info = await fetch(`/b/${SLUG}/barbearia-info`).then(r=>r.json());
      const root = document.documentElement.style;
      const cp = info.cor_primaria || '#BA7517';
      root.setProperty('--cor-primaria', cp);
      root.setProperty('--cor-fundo',    info.cor_fundo || '#1a1a1a');
      root.setProperty('--cor-card',     info.cor_card  || '#2a2a2a');
      if (info.fonte) root.setProperty('--fonte', `'${info.fonte}', sans-serif`);
      const _r = (h,a)=>{const x=(h||'#BA7517').replace('#','');return `rgba(${parseInt(x.slice(0,2),16)},${parseInt(x.slice(2,4),16)},${parseInt(x.slice(4,6),16)},${a})`;};
      [.10,.12,.15,.30].forEach(a=>root.setProperty(`--cp-${String(a*100).replace('.','').padStart(2,'0')}`,_r(cp,a)));
    } catch{}

    // Dados do agendamento
    try {
      const d = await fetch(`/b/${SLUG}/agendamento/${AG_ID}`).then(r=>r.json());
      const dt      = new Date(d.data_hora);
      const dataFmt = dt.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
      const horaFmt = dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      const av = d.barbeiro?.foto
        ? `<div class="barb-av"><img src="${d.barbeiro.foto}" alt="${esc(d.barbeiro.nome)}"></div>`
        : `<div class="barb-av">${(d.barbeiro?.nome||'B').charAt(0)}</div>`;

      // Serviços
      const svs = d.servicos?.length ? d.servicos : (d.servico ? [{nome: d.servico.nome, quantidade:1, subtotal: d.servico.preco||0}] : []);
      const svHtml = svs.map(s =>
        `<div style="display:flex;justify-content:space-between;font-size:14px;padding:3px 0">
          <span>${esc(s.nome)}${s.quantidade>1?' ×'+s.quantidade:''}</span>
          <span style="font-weight:600">R$ ${Number(s.subtotal||s.preco_unitario).toFixed(2)}</span>
        </div>`
      ).join('');

      // Produtos
      const pds = d.produtos || [];
      const pdHtml = pds.length ? `
        <div class="resumo-row">
          <div class="resumo-icon">🛍</div>
          <div style="flex:1">
            <div class="resumo-label">Produtos</div>
            ${pds.map(p =>
              `<div style="display:flex;justify-content:space-between;font-size:14px;padding:3px 0">
                <span>${esc(p.nome)}${p.quantidade>1?' ×'+p.quantidade:''}</span>
                <span style="font-weight:600">R$ ${Number(p.subtotal||p.preco_unitario).toFixed(2)}</span>
              </div>`
            ).join('')}
          </div>
        </div>` : '';

      // Total
      const total = d.total != null ? d.total : svs.reduce((t,s)=>t+Number(s.subtotal||s.preco_unitario||0),0);

      document.getElementById('resumo').innerHTML = `
        <div class="resumo-row">
          <div class="resumo-icon">✂️</div>
          <div style="flex:1">
            <div class="resumo-label">Serviço${svs.length>1?'s':''}</div>
            ${svHtml}
          </div>
        </div>
        ${pdHtml}
        <div class="resumo-row">
          <div class="resumo-icon">👤</div>
          <div>
            <div class="resumo-label">Barbeiro</div>
            <div class="barb-row">${av}<div class="resumo-val">${esc(d.barbeiro?.nome||'—')}</div></div>
          </div>
        </div>
        <div class="resumo-row">
          <div class="resumo-icon">📅</div>
          <div>
            <div class="resumo-label">Data</div>
            <div class="resumo-val">${dataFmt}</div>
          </div>
        </div>
        <div class="resumo-row">
          <div class="resumo-icon">⏰</div>
          <div>
            <div class="resumo-label">Horário</div>
            <div class="resumo-val">${horaFmt} · ${d.duracao_minutos} min</div>
          </div>
        </div>
        <div class="resumo-row">
          <div class="resumo-icon">🏪</div>
          <div>
            <div class="resumo-label">Barbearia</div>
            <div class="resumo-val">${esc(d.barbearia?.nome||'—')}</div>
          </div>
        </div>
        <div class="resumo-row" style="border-top:1px solid rgba(255,255,255,.1);padding-top:12px;margin-top:4px">
          <div class="resumo-icon" style="background:var(--cp-15)">💰</div>
          <div>
            <div class="resumo-label">Total</div>
            <div class="resumo-val" style="font-size:18px;color:var(--cor-primaria)">R$ ${Number(total).toFixed(2)}</div>
          </div>
        </div>
      `;
    } catch(e) {
      document.getElementById('resumo').innerHTML = `<p class="loading">Erro ao carregar: ${e.message}</p>`;
    }
  }

  carregar();
</script>
</body>
</html>
